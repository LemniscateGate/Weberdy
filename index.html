<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>WEB∃RDY</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060e;
    --surface: #0a0a16;
    --steel: #5ba3c9;
    --steel-bright: #a8d8f0;
    --steel-dim: #1a3a4a;
    --text: #dde8ee;
    --muted: rgba(168,216,240,0.3);
    --user-bg: rgba(91,163,201,0.08);
    --red: #c94c4c;
  }

  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 70% 40% at 50% 0%, rgba(91,163,201,0.07) 0%, transparent 70%);
    pointer-events: none; z-index: 0;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 3px);
    pointer-events: none; z-index: 0;
  }

  #app {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    max-width: 560px; margin: 0 auto;
  }

  /* HEADER */
  header {
    padding: 22px 24px 14px;
    border-bottom: 1px solid rgba(91,163,201,0.1);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: space-between;
  }

  .wordmark {
    font-family: 'Share Tech Mono', monospace;
    font-size: 26px; font-weight: 700;
    letter-spacing: 0.22em;
    color: var(--steel-bright);
    text-shadow: 0 0 22px rgba(168,216,240,0.5), 0 0 55px rgba(91,163,201,0.25);
    animation: glow 4s ease-in-out infinite alternate;
  }
  .be { display: inline-block; transform: scaleX(-1); }
  @keyframes glow {
    from { text-shadow: 0 0 18px rgba(168,216,240,0.4), 0 0 40px rgba(91,163,201,0.2); }
    to   { text-shadow: 0 0 30px rgba(168,216,240,0.75), 0 0 70px rgba(91,163,201,0.45); }
  }

  .header-right { display: flex; align-items: center; gap: 14px; }

  /* ORB */
  .orb {
    width: 24px; height: 24px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #0c2233, #020810);
    border: 1px solid var(--steel-dim);
    flex-shrink: 0;
    transition: border-color 0.4s, box-shadow 0.4s;
  }
  .orb.online   { animation: orbIdle  3s ease-in-out infinite; }
  .orb.thinking { border-color: var(--steel); animation: orbThink 0.7s ease-in-out infinite; }
  .orb.speaking { border-color: var(--steel-bright); animation: orbSpeak 1s ease-in-out infinite; }
  @keyframes orbIdle  { 0%,100%{box-shadow:0 0 4px rgba(91,163,201,0.2)} 50%{box-shadow:0 0 12px rgba(91,163,201,0.4)} }
  @keyframes orbThink { 0%,100%{box-shadow:0 0 8px rgba(91,163,201,0.4)} 50%{box-shadow:0 0 20px rgba(91,163,201,0.7)} }
  @keyframes orbSpeak { 0%,100%{box-shadow:0 0 12px rgba(168,216,240,0.6),0 0 28px rgba(91,163,201,0.35)} 50%{box-shadow:0 0 24px rgba(168,216,240,0.9),0 0 52px rgba(91,163,201,0.6)} }

  .voice-btn {
    background: none; border: none; cursor: pointer;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 0.15em;
    color: var(--muted); text-transform: uppercase;
    display: flex; align-items: center; gap: 5px;
    transition: color 0.2s; padding: 4px;
  }
  .voice-btn.active { color: var(--steel-bright); }
  .voice-btn svg { width: 12px; height: 12px; fill: currentColor; }

  /* MESSAGES */
  #messages {
    flex: 1; overflow-y: auto;
    padding: 20px 20px;
    display: flex; flex-direction: column; gap: 14px;
    scroll-behavior: smooth;
    scrollbar-width: thin;
    scrollbar-color: var(--steel-dim) transparent;
  }

  .msg { display:flex; flex-direction:column; gap:3px; max-width:85%; animation: up 0.28s ease; }
  @keyframes up { from{opacity:0;transform:translateY(7px)} to{opacity:1;transform:none} }
  .msg.user  { align-self:flex-end;  align-items:flex-end; }
  .msg.agent { align-self:flex-start; align-items:flex-start; }

  .msg-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--muted); padding: 0 3px;
  }
  .msg.user .msg-label { color: rgba(91,163,201,0.5); }

  .msg-bubble {
    padding: 11px 15px;
    font-size: 15px; font-weight: 300; line-height: 1.7;
    position: relative; overflow: hidden;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(91,163,201,0.18);
    border-radius: 12px 12px 2px 12px;
    color: var(--text);
  }
  .msg.agent .msg-bubble {
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--steel-dim);
    border-left: 2px solid var(--steel);
    border-radius: 12px 12px 12px 2px;
    color: var(--text);
    animation: bubbleBreath 3.5s ease-in-out infinite alternate;
  }
  @keyframes bubbleBreath {
    from { box-shadow: 0 0 10px rgba(91,163,201,0.05); border-left-color: var(--steel-dim); }
    to   { box-shadow: 0 0 24px rgba(91,163,201,0.15), inset 0 0 12px rgba(91,163,201,0.04); border-left-color: var(--steel); }
  }
  .msg.agent .msg-bubble::after {
    content: '';
    position: absolute; top:0; left:-100%; width:50%; height:100%;
    background: linear-gradient(90deg, transparent, rgba(168,216,240,0.04), transparent);
    animation: shimmer 1.8s ease forwards;
  }
  @keyframes shimmer { to { left:200%; } }

  /* THINKING */
  .thinking {
    display: flex; gap: 5px; align-items: center;
    padding: 13px 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--steel-dim);
    border-left: 2px solid var(--steel-dim);
    border-radius: 12px 12px 12px 2px;
    animation: thinkPulse 1.4s ease-in-out infinite;
  }
  @keyframes thinkPulse {
    0%,100%{ border-left-color:var(--steel-dim); }
    50%    { border-left-color:var(--steel); box-shadow:0 0 12px rgba(91,163,201,0.1); }
  }
  .td { width:5px; height:5px; border-radius:50%; background:var(--steel-dim); animation:tdot 1.2s ease-in-out infinite; }
  .td:nth-child(2){animation-delay:0.2s} .td:nth-child(3){animation-delay:0.4s}
  @keyframes tdot {
    0%,80%,100%{transform:scale(0.65);opacity:0.3;background:var(--steel-dim)}
    40%        {transform:scale(1.2);opacity:1;background:var(--steel-bright);box-shadow:0 0 5px var(--steel)}
  }

  .speak-bars { display:inline-flex;align-items:center;gap:2px;margin-left:7px;vertical-align:middle; }
  .sb { width:2px;height:9px;background:var(--steel);border-radius:1px;animation:sb 0.8s ease infinite; }
  .sb:nth-child(2){animation-delay:0.15s;height:13px} .sb:nth-child(3){animation-delay:0.3s}
  @keyframes sb{0%,100%{transform:scaleY(0.35);opacity:0.45}50%{transform:scaleY(1);opacity:1}}

  /* EMPTY */
  .empty {
    flex:1; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:10px; padding:40px; text-align:center; opacity:0.3;
  }
  .empty-word {
    font-family:'Share Tech Mono',monospace;
    font-size:28px; color:var(--steel-bright);
    letter-spacing:0.22em;
    text-shadow:0 0 18px rgba(168,216,240,0.4);
  }
  .empty-sub { font-size:13px; font-weight:300; color:var(--muted); letter-spacing:0.08em; line-height:1.6; }

  /* FOOTER */
  footer {
    padding: 10px 20px 18px;
    border-top: 1px solid rgba(91,163,201,0.1);
    display: flex; flex-direction: column; gap: 8px;
    flex-shrink: 0;
  }

  /* ATTACH */
  .attach {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 12px;
    border: 1px dashed rgba(91,163,201,0.15);
    border-radius: 6px; cursor: pointer;
    position: relative; transition: all 0.2s;
  }
  .attach input { position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%; }
  .attach:hover, .attach.drag { border-color:var(--steel-dim); background:rgba(91,163,201,0.04); }
  .attach-icon { color:var(--muted); font-size:14px; flex-shrink:0; transition:color 0.2s; }
  .attach:hover .attach-icon { color:var(--steel); }
  .attach-label {
    font-family:'Share Tech Mono',monospace;
    font-size:10px; color:var(--muted); letter-spacing:0.1em; transition:color 0.2s;
  }
  .attach:hover .attach-label { color:var(--steel); }
  .tags { margin-left:auto; display:flex; gap:4px; flex-wrap:wrap; max-width:60%; justify-content:flex-end; }
  .tag {
    font-family:'Share Tech Mono',monospace; font-size:10px;
    padding:2px 7px; border-radius:3px;
    background:rgba(91,163,201,0.08); border:1px solid var(--steel-dim);
    color:var(--steel); display:flex; align-items:center; gap:4px;
  }
  .tag-x { cursor:pointer; opacity:0.5; transition:opacity 0.15s; }
  .tag-x:hover { opacity:1; }

  /* INPUT ROW */
  .input-row { display:flex; gap:8px; align-items:flex-end; }

  textarea {
    flex:1;
    background: var(--surface);
    border: 1px solid rgba(91,163,201,0.15);
    border-radius: 8px;
    padding: 12px 14px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px; font-weight: 300;
    color: var(--text); resize: none; outline: none;
    min-height: 46px; max-height: 120px; line-height: 1.4;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  textarea::placeholder { color:rgba(255,255,255,0.18); font-style:italic; }
  textarea:focus { border-color:var(--steel-dim); box-shadow:0 0 14px rgba(91,163,201,0.1); }
  textarea.listening { border-color:var(--red); }

  .btn {
    width:46px; height:46px; border-radius:8px; cursor:pointer; flex-shrink:0;
    display:flex; align-items:center; justify-content:center;
    transition: all 0.2s;
  }
  #mic-btn {
    background:rgba(91,163,201,0.06);
    border:1px solid rgba(91,163,201,0.18);
  }
  #mic-btn:hover { background:rgba(91,163,201,0.12); border-color:var(--steel-dim); }
  #mic-btn.active { background:rgba(201,76,76,0.15); border-color:var(--red); }
  #mic-btn svg { width:18px; height:18px; fill:var(--muted); transition:fill 0.2s; }
  #mic-btn.active svg { fill:var(--red); }

  #send-btn {
    background:rgba(91,163,201,0.1);
    border:1px solid rgba(91,163,201,0.35);
  }
  #send-btn:hover:not(:disabled) { background:rgba(91,163,201,0.2); border-color:var(--steel); box-shadow:0 0 14px rgba(91,163,201,0.2); }
  #send-btn:disabled { opacity:0.25; cursor:not-allowed; }
  #send-btn svg { width:17px; height:17px; fill:var(--steel-bright); }

  /* TOASTS */
  .toast {
    position:fixed; bottom:80px; left:50%;
    transform:translateX(-50%) translateY(16px);
    font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:0.1em;
    padding:9px 16px; border-radius:4px;
    opacity:0; transition:opacity 0.3s,transform 0.3s;
    pointer-events:none; z-index:100;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
  #t-err { background:rgba(180,60,60,0.92); color:#fff; }
  #t-inf { background:rgba(91,163,201,0.92); color:#06060e; }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="wordmark">WEB<span class="be">E</span>RDY</div>
    <div class="header-right">
      <button class="voice-btn" id="voice-btn" onclick="toggleSpeak()">
        <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
        SPEAK
      </button>
      <div class="orb online" id="orb"></div>
    </div>
  </header>

  <div id="messages">
    <div class="empty" id="empty">
      <div class="empty-word">WEB<span class="be">E</span>RDY</div>
      <div class="empty-sub">Sovereign node standing by.<br>Type or speak.</div>
    </div>
  </div>

  <footer>
    <div class="attach" id="attach-zone">
      <input type="file" id="file-input" multiple onchange="addFiles(this.files)">
      <span class="attach-icon">⊕</span>
      <span class="attach-label">ATTACH FILES · IMAGES · DOCS</span>
      <div class="tags" id="tags"></div>
    </div>
    <div class="input-row">
      <textarea id="input" placeholder="Speak or type to Weberdy..." rows="1"
        onkeydown="onKey(event)" oninput="resize(this)"></textarea>
      <button class="btn" id="mic-btn" onclick="toggleMic()">
        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm-1-9c0-.55.45-1 1-1s1 .45 1 1v6c0 .55-.45 1-1 1s-1-.45-1-1V5zm6 6c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
      </button>
      <button class="btn" id="send-btn" onclick="send()" disabled>
        <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
      </button>
    </div>
  </footer>
</div>

<div id="t-err" class="toast"></div>
<div id="t-inf" class="toast"></div>

<script>
const API = 'http://localhost:8001';
let history = [], thinking = null, autoSpeak = false;
let listening = false, recognition = null, speaking = false;
let files = [];

window.addEventListener('load', () => {
  speechSynthesis && speechSynthesis.getVoices();
  initMic();
  document.getElementById('input').addEventListener('input', () => {
    document.getElementById('send-btn').disabled = !document.getElementById('input').value.trim();
  });
  ping();
});

async function ping() {
  try { const r = await fetch(API+'/', {signal:AbortSignal.timeout(3000)}); if(r.ok) orb('online'); }
  catch { orb('offline'); }
}

function orb(s) { document.getElementById('orb').className = 'orb '+s; }

function initMic() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { document.getElementById('mic-btn').style.opacity='0.3'; return; }
  recognition = new SR();
  recognition.continuous = false; recognition.interimResults = true; recognition.lang = 'en-US';
  recognition.onstart = () => {
    listening = true;
    document.getElementById('mic-btn').classList.add('active');
    const i = document.getElementById('input');
    i.classList.add('listening'); i.placeholder = 'Listening...';
  };
  recognition.onresult = e => {
    let f='', interim='';
    for (let i=e.resultIndex;i<e.results.length;i++)
      e.results[i].isFinal ? f+=e.results[i][0].transcript : interim+=e.results[i][0].transcript;
    const i = document.getElementById('input');
    i.value = f||interim; resize(i);
    if (f) setTimeout(send, 400);
  };
  recognition.onerror = e => { stopMic(); if(e.error!=='no-speech') err('Mic: '+e.error); };
  recognition.onend = stopMic;
}

function toggleMic() {
  if (listening) { stopMic(); return; }
  if (!recognition) { err('Use Chrome for mic'); return; }
  if (speaking) speechSynthesis.cancel();
  try { recognition.start(); } catch(e) { err('Mic error'); }
}

function stopMic() {
  listening = false;
  document.getElementById('mic-btn').classList.remove('active');
  const i = document.getElementById('input');
  i.classList.remove('listening'); i.placeholder='Speak or type to Weberdy...';
  try { recognition&&recognition.stop(); } catch(e){}
}

function speakText(text, bubble) {
  if (!speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate=0.92; u.pitch=1; u.volume=1;
  const voices = speechSynthesis.getVoices();
  const v = voices.find(v=>v.name.includes('Samantha')||v.name.includes('Google US English')||(v.lang==='en-US'&&v.localService));
  if (v) u.voice=v;
  speaking=true; orb('speaking');
  const bars = document.createElement('span');
  bars.className='speak-bars';
  bars.innerHTML='<span class="sb"></span><span class="sb"></span><span class="sb"></span>';
  if(bubble) bubble.appendChild(bars);
  u.onend=u.onerror=()=>{ speaking=false; orb('online'); if(bars.parentNode) bars.remove(); };
  speechSynthesis.speak(u);
}

function toggleSpeak() {
  autoSpeak=!autoSpeak;
  document.getElementById('voice-btn').classList.toggle('active',autoSpeak);
  inf(autoSpeak?'Voice ON':'Voice OFF');
}

async function send() {
  const inp = document.getElementById('input');
  const text = inp.value.trim();
  if (!text) return;
  inp.value=''; resize(inp);
  document.getElementById('send-btn').disabled=true;
  hideEmpty();
  addMsg('user','You',text);
  history.push({role:'user',content:text});
  showThinking(); orb('thinking');
  try {
    const r = await fetch(API+'/v/prompt',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({prompt:text}),
      signal:AbortSignal.timeout(30000)
    });
    const d = await r.json();
    const reply = d.response||d.answer||d.text||JSON.stringify(d);
    removeThinking();
    const bubble = addMsg('agent','Weberdy',reply);
    history.push({role:'assistant',content:reply});
    if(autoSpeak) setTimeout(()=>speakText(reply,bubble),200);
    else orb('online');
  } catch(e) {
    removeThinking(); orb('online');
    addMsg('agent','Weberdy', e.name==='TimeoutError'?'⚠ Timeout — is Weberdy running?':'⚠ '+e.message);
  }
}

function addMsg(role, label, text) {
  hideEmpty();
  const c = document.getElementById('messages');
  const w = document.createElement('div'); w.className='msg '+role;
  const l = document.createElement('div'); l.className='msg-label'; l.textContent=label;
  const b = document.createElement('div'); b.className='msg-bubble'; b.textContent=text;
  w.appendChild(l); w.appendChild(b); c.appendChild(w);
  c.scrollTop=c.scrollHeight;
  return b;
}

function showThinking() {
  if(thinking) return;
  const c=document.getElementById('messages');
  thinking=document.createElement('div'); thinking.className='msg agent';
  thinking.innerHTML='<div class="msg-label">Weberdy</div><div class="thinking"><div class="td"></div><div class="td"></div><div class="td"></div></div>';
  c.appendChild(thinking); c.scrollTop=c.scrollHeight;
}

function removeThinking() { if(thinking){thinking.remove();thinking=null;} }
function hideEmpty() { const e=document.getElementById('empty'); if(e) e.style.display='none'; }
function onKey(e) { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} }
function resize(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,120)+'px';
  document.getElementById('send-btn').disabled=!el.value.trim();
}

function addFiles(list) {
  [...list].forEach(f=>{if(!files.find(x=>x.name===f.name))files.push(f);});
  renderTags();
}
function removeFile(name) { files=files.filter(f=>f.name!==name); renderTags(); }
function renderTags() {
  document.getElementById('tags').innerHTML=files.map(f=>
    `<span class="tag">${esc(f.name.length>14?f.name.slice(0,12)+'…':f.name)}<span class="tag-x" onclick="removeFile('${esc(f.name)}')">✕</span></span>`
  ).join('');
}

const az=document.getElementById('attach-zone');
az.addEventListener('dragover',e=>{e.preventDefault();az.classList.add('drag');});
az.addEventListener('dragleave',()=>az.classList.remove('drag'));
az.addEventListener('drop',e=>{e.preventDefault();az.classList.remove('drag');addFiles(e.dataTransfer.files);});

function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function err(m){toast('t-err',m,3500);}
function inf(m){toast('t-inf',m,2000);}
function toast(id,msg,dur){const t=document.getElementById(id);t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),dur);}
</script>
</body>
</html>
