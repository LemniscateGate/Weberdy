<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weberdy Interface</title>
<style>
body {
    background: #0b0b0b;
    color: #e8e0d0;
    font-family: system-ui, Arial, sans-serif;
    margin: 0;
    display: flex;
    flex-direction: column;
    height: 100vh;
}
header {
    padding: 16px;
    border-bottom: 1px solid #333;
    font-size: 20px;
}
#chat {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
}
.message {
    margin-bottom: 12px;
    padding: 10px;
    border-radius: 8px;
}
.user {
    background: #1a1a1a;
}
.agent {
    background: #141414;
    border: 1px solid #333;
}
footer {
    display: flex;
    border-top: 1px solid #333;
}
input {
    flex: 1;
    padding: 14px;
    border: none;
    outline: none;
    background: #0b0b0b;
    color: #fff;
}
button {
    padding: 14px 20px;
    border: none;
    background: #c9a84c;
    color: black;
    cursor: pointer;
}
</style>
</head>
<body>

<header>Weberdy — Private Interface</header>

<div id="chat"></div>

<footer>
<input id="input" placeholder="Speak to Weberdy..." />
<button onclick="send()">Send</button>
</footer>

<script>
const chat = document.getElementById("chat");

function addMessage(text, type) {
    const div = document.createElement("div");
    div.className = "message " + type;
    div.innerText = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
}

async function send() {
    const input = document.getElementById("input");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ message })
        });

        const data = await res.json();
        addMessage("Weberdy received: " + data.message_received, "agent");
    } catch (err) {
        addMessage("Connection error to Weberdy backend.", "agent");
    }
}
</script>

</body>
</html>
